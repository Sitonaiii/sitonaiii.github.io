<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slides PDF</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f6f7f9;
        color: #1f2328;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
        padding: 14px 20px;
        border-bottom: 1px solid #d8dee4;
        background: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
      }

      a {
        color: inherit;
      }

      .open-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #f6f8fa;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
      }

      main {
        height: calc(100vh - 64px);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      .fallback {
        margin: 0;
        padding: 20px;
      }

      @media (max-width: 560px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          height: calc(100vh - 113px);
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0d1117;
          color: #f0f6fc;
        }

        header {
          border-color: #30363d;
          background: #161b22;
        }

        .open-link {
          border-color: #30363d;
          background: #21262d;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Slides PDF</h1>
      <a class="open-link" href="slides1.pdf" target="_blank" rel="noopener">Open PDF</a>
    </header>
    <main>
      <iframe title="Slides PDF" src="slides1.pdf">
        <p class="fallback">
          Your browser cannot display this PDF inline.
          <a href="slides1.pdf">Open the PDF instead.</a>
        </p>
      </iframe>
    </main>
  </body>
</html>
